<svg xmlns="http://www.w3.org/2000/svg" width="650" height="150" viewBox="0 0 650 150" role="img" aria-labelledby="title desc">
  <title id="title">PDF Solver logo</title>
  <desc id="desc">PDF Solver logo with blue document folder icon, green solving arrow, and tagline Document Solutions Simplified.</desc>

  <defs>
    <linearGradient id="blueGradient" x1="14" y1="24" x2="116" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#178FC4"/>
      <stop offset="0.45" stop-color="#126AA0"/>
      <stop offset="1" stop-color="#163F73"/>
    </linearGradient>

    <linearGradient id="greenGradient" x1="70" y1="25" x2="113" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9DCA3B"/>
      <stop offset="1" stop-color="#6FAF3F"/>
    </linearGradient>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g transform="translate(18 22)" filter="url(#softShadow)">
    <path d="M7 10 C7 5.6 10.6 2 15 2 H45 C49.2 2 52.2 5.5 54.4 9 L59 16 H103 C108 16 112 20 112 25 V94 C112 99 108 103 103 103 H15 C10.6 103 7 99.4 7 95 Z" fill="url(#blueGradient)"/>

