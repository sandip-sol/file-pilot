    <path d="M86 21 L113 21 L113 48 L103 39 C94 49 81 55 63 55 H43 C35 55 30 59 30 65 C30 71 35 75 43 75 H83 C88 75 92 79 92 84 C92 89 88 93 83 93 H41 C23 93 11 82 11 66 C11 50 24 39 43 39 H63 C74 39 82 36 88 30 Z" fill="url(#greenGradient)"/>

    <path d="M30 51 C35 47 40 45 48 45 H66 C78 45 88 41 96 34 L101 39 C91 50 79 56 64 56 H45 C36 56 30 60 30 66 C30 72 36 76 45 76 H78 C81 76 83 78 83 81 C83 84 81 86 78 86 H42 C27 86 18 78 18 66 C18 59 22 54 30 51Z" fill="#ffffff" opacity="0.92"/>

    <path d="M96 18 L116 6 L112 30 Z" fill="#8BC53F"/>
  </g>

  <g transform="translate(152 44)">
    <text x="0" y="46" font-family="Inter, Arial, Helvetica, sans-serif" font-size="54" font-weight="800" letter-spacing="-1.8" fill="#153B66">PDF</text>
    <text x="113" y="46" font-family="Inter, Arial, Helvetica, sans-serif" font-size="54" font-weight="700" letter-spacing="-2" fill="#84BD3B">Solver</text>
    <text x="1" y="78" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="#404040">Document Solutions Simplified</text>
